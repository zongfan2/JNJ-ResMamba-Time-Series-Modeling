# =============================================================================
# Baseline comparison — BiLSTM (Bidirectional LSTM)
# =============================================================================
# Classic recurrent baseline with attention pooling and multi-task heads.
# Same data / loss / CV setup as the ablation configs so results are directly
# comparable to MBA_v1.
#
# Usage:
#   python3.11 training/train_scratch.py \
#     --config experiments/configs/ablation/baseline_bilstm.yaml

experiment:
  name: baseline_bilstm
  description: "BiLSTM baseline — 3-layer bidirectional LSTM with multi-task heads."
  task: scratch_detection
  date: "2026-04-18"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/mbav1_scaler.joblib

model:
  architecture: bilstm
  overrides:
    # BiLSTMMultiTask hyperparameters (see setup_model "bilstm" case)
    hidden_size: 256
    num_lstm_layers: 3
    dropout: 0.2

training:
  output: baseline-bilstm-bs32-fold4
  execution_mode: train
  epochs: 200
  batch_size: 32
  num_gpu: 0
  clear_tracker: true
  data_augmentation: 0
  testing: LOFO

transfer_learning:
  freeze_encoder: false
  pretrained_model_path: ""

reproducibility:
  random_seed: 42
  torch_seed: 42
  numpy_seed: 42
