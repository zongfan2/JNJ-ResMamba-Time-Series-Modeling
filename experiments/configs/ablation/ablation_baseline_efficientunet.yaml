# =============================================================================
# Baseline comparison — EfficientUNet
# =============================================================================
# EfficientNet encoder with TCN bridge and symmetric decoder.
# Same data / loss / CV setup as MBA_v1 ablation for fair comparison.
#
# Usage:
#   python3.11 training/train_scratch.py \
#     --config experiments/configs/ablation/ablation_baseline_efficientunet.yaml

experiment:
  name: baseline_efficientunet
  description: "EfficientUNet baseline — EfficientNet encoder + TCN bridge + U-Net decoder."
  task: scratch_detection
  date: "2026-04-20"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/mbav1_scaler.joblib

model:
  architecture: efficient_unet
  overrides:
    d_model: 1024
    target_shape: 128
    reg_head: true
    tcn_num_filters: 64
    tcn_kernel_size: 7
    tcn_num_blocks: 6
    mask_padding: true
    average_mask: false
    average_window_size: 20

training:
  output: baseline-efficientunet-bs32-fold4
  execution_mode: train
  epochs: 200
  batch_size: 32
  num_gpu: 0
  clear_tracker: true
  data_augmentation: 0
  testing: LOFO

transfer_learning:
  freeze_encoder: false
  pretrained_model_path: ""

reproducibility:
  random_seed: 42
  torch_seed: 42
  numpy_seed: 42
