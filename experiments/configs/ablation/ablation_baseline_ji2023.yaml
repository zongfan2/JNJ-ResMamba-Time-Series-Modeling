# =============================================================================
# Baseline comparison — Ji et al. 2023 (npj Digital Medicine) — pragmatic
# =============================================================================
# LightGBM on the same 36 time/frequency features as Paper 1.  The full paper
# adds 11 TDA (topological) features and 10 DL-derived features for a 348-dim
# vector; we omit those in this pragmatic replication (clear deviation from
# the paper — documented in the paper writeup).  Reference:
#   https://www.nature.com/articles/s41746-023-00821-y
#
# Usage:
#   python3.11 training/train_classical.py \
#     --config experiments/configs/ablation/ablation_baseline_ji2023.yaml

experiment:
  name: baseline_ji2023
  description: "Paper 2 baseline (pragmatic) — LightGBM on 36 hand-crafted features."
  task: scratch_detection
  date: "2026-04-22"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: ""

model:
  architecture: ji2023
  overrides:
    n_estimators: 500
    learning_rate: 0.05
    num_leaves: 31
    max_depth: -1
    min_child_samples: 20
    reg_lambda: 0.0
    # scale_pos_weight: auto (neg/pos ratio) when null
    scale_pos_weight: null
    random_state: 42

training:
  output: baseline-ji2023-fold4
  execution_mode: train
  testing: LOFO
  num_gpu: 0

reproducibility:
  random_seed: 42
  numpy_seed: 42
