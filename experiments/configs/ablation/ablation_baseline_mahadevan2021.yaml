# =============================================================================
# Baseline comparison — Mahadevan et al. 2021 (npj Digital Medicine), XGBoost variant
# =============================================================================
# Paper 1's feature engineering (36 time/frequency features on SVM/PC1/PC2 of
# the 0.25 Hz high-pass-filtered accelerometer) + 26 RFECV-selected features
# feeding an XGBoost classifier (replacing the paper's RandomForest per our
# experimental setup) and an XGBoost regressor for per-segment scratch
# duration.  Reference:
#   https://www.nature.com/articles/s41746-021-00402-x
#
# Runs via training/train_classical.py.  LOSO cross-validation.
#
# Usage:
#   python3.11 training/train_classical.py \
#     --config experiments/configs/ablation/ablation_baseline_mahadevan2021.yaml

experiment:
  name: baseline_mahadevan2021
  description: "Paper 1 baseline — XGBoost + 36 hand-crafted features (classification + duration regression)."
  task: scratch_detection
  date: "2026-04-23"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: ""

model:
  architecture: mahadevan2021
  overrides:
    # XGBoost classifier
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.9
    colsample_bytree: 0.9
    reg_lambda: 1.0
    # feature selection
    num_features: 26
    random_state: 42
    # Duration regression — zero-inflated target; train reg on positives
    # only and gate by p_scratch (pr3 = p * E[dur|scratch]).
    reg_hurdle: true
    reg_log_target: true

training:
  output: baseline-mahadevan2021-loso
  execution_mode: train
  testing: LOSO
  num_gpu: 0

# Paper-faithful 3-s sliding-window protocol.
# Mahadevan 2021 §Methods: 3-s windows; annotations >3 s segmented at
# 50% overlap for training; non-overlapping 3-s windows at inference;
# total scratch duration = sum of contiguous 3-s positive bouts (= count rule).
windowing:
  enabled: true
  fs_hz: 20
  win_seconds: 3.0
  train_stride_seconds: 1.5     # 50% overlap during training (Mahadevan 2021)
  infer_stride_seconds: 3.0     # non-overlap at inference (Mahadevan 2021)
  label_min_scratch_seconds: 1.0  # Ji 2023 rule (>1 s scratch → positive)
  duration_estimator: count     # pr3 = win_seconds × n_pos_windows; matches paper
  min_pos_windows: 1            # any positive window flips bout positive

reproducibility:
  random_seed: 42
  numpy_seed: 42
