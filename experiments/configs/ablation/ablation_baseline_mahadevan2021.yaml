# =============================================================================
# Baseline comparison — Mahadevan et al. 2021 (npj Digital Medicine), RandomForest
# =============================================================================
# Paper-faithful replica: Paper 1's feature engineering (36 time/frequency
# features on SVM/PC1/PC2 of the 0.25 Hz high-pass-filtered accelerometer)
# + 26 RFECV-selected features feeding a RandomForest classifier with
# 50 estimators (paper §Methods: "A random forest classifier with 50
# estimators was then trained based on the selected features. ... saw no
# significant improvement in model performance as we increased the number
# of estimators past 50.").  Class balancing via random undersampling
# before feature selection (also paper-faithful).  An XGBoost regressor is
# kept for the per-segment scratch duration hurdle estimator (the paper
# aggregates via the count rule = win_seconds × n_pos_windows, so this
# regressor is only used when ``windowing.duration_estimator: regressor``).
# Reference:
#   https://www.nature.com/articles/s41746-021-00402-x
#
# Runs via training/train_classical.py.  LOSO cross-validation.
#
# Usage:
#   python3.11 training/train_classical.py \
#     --config experiments/configs/ablation/ablation_baseline_mahadevan2021.yaml

experiment:
  name: baseline_mahadevan2021
  description: "Paper 1 baseline — RandomForest (50 trees) + 26-of-36 RFECV-selected features (paper-faithful)."
  task: scratch_detection
  date: "2026-05-08"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: ""

model:
  architecture: mahadevan2021
  overrides:
    # RandomForest classifier — paper values.
    n_estimators: 50              # paper: 50; tested 25/50/75/100, no gain past 50.
    max_depth: -1                 # null / unconstrained, sklearn default.
    min_samples_leaf: 1           # sklearn default.
    max_features: sqrt            # sklearn default for classification.
    # feature selection
    num_features: 26              # 26-of-36 via RFECV (paper).
    random_state: 42
    # Duration regression — zero-inflated target; hurdle (positives only).
    # Only used if windowing.duration_estimator is 'regressor'; with 'count'
    # it's trained-but-unused, kept here so the YAML can flip estimator
    # post-hoc without retraining.
    reg_hurdle: true
    reg_log_target: true

training:
  output: baseline-mahadevan2021-loso
  execution_mode: train
  testing: LOSO
  num_gpu: 0

# Paper-faithful 3-s sliding-window protocol.
# Mahadevan 2021 §Methods: 3-s windows; annotations >3 s segmented at
# 50% overlap for training; non-overlapping 3-s windows at inference;
# total scratch duration = sum of contiguous 3-s positive bouts (= count rule).
windowing:
  enabled: true
  fs_hz: 20
  win_seconds: 3.0
  train_stride_seconds: 1.5     # 50% overlap during training (Mahadevan 2021)
  infer_stride_seconds: 3.0     # non-overlap at inference (Mahadevan 2021)
  label_min_scratch_seconds: 1.0  # Ji 2023 rule (>1 s scratch → positive)
  duration_estimator: count     # pr3 = win_seconds × n_pos_windows; matches paper
  min_pos_windows: 2            # require >=2 positive windows to flip bout positive (suppresses single-FP-window 3-s pr3 spikes that drive R^2 negative)

reproducibility:
  random_seed: 42
  numpy_seed: 42
