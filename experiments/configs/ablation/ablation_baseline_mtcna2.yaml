# =============================================================================
# Baseline comparison — MTCNA2 (Multi-Task TCN with Attention)
# =============================================================================
# Dilated causal TCN with gated attention pooling and multi-task heads.
# Same data / loss / CV setup as MBA_v1 ablation for fair comparison.
#
# Usage:
#   python3.11 training/train_scratch.py \
#     --config experiments/configs/ablation/ablation_baseline_mtcna2.yaml

experiment:
  name: baseline_mtcna2
  description: "MTCNA2 baseline — Multi-Task TCN with attention mechanism."
  task: scratch_detection
  date: "2026-04-20"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/mbav1_scaler.joblib

model:
  architecture: mtcna2
  overrides: {}

training:
  output: baseline-mtcna2-bs32-fold4
  execution_mode: train
  epochs: 200
  batch_size: 32
  num_gpu: 0
  clear_tracker: true
  data_augmentation: 0
  testing: LOFO

transfer_learning:
  freeze_encoder: false
  pretrained_model_path: ""

reproducibility:
  random_seed: 42
  torch_seed: 42
  numpy_seed: 42
