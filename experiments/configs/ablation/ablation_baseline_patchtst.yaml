# =============================================================================
# Baseline comparison — PatchTST (Patch Time Series Transformer)
# =============================================================================
# Patch-based Transformer with multi-head self-attention.
# Same data / loss / CV setup as MBA_v1 ablation for fair comparison.
#
# Usage:
#   python3.11 training/train_scratch.py \
#     --config experiments/configs/ablation/ablation_baseline_patchtst.yaml

experiment:
  name: baseline_patchtst
  description: "PatchTST baseline — Patch-based Time Series Transformer."
  task: scratch_detection
  date: "2026-04-20"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/mbav1_scaler.joblib

model:
  architecture: patchtst
  overrides: {}

training:
  output: baseline-patchtst-bs32-loso
  execution_mode: train
  epochs: 200
  batch_size: 32
  num_gpu: 0
  clear_tracker: true
  data_augmentation: 0
  testing: LOSO

transfer_learning:
  freeze_encoder: false
  pretrained_model_path: ""

reproducibility:
  random_seed: 42
  torch_seed: 42
  numpy_seed: 42
