# =============================================================================
# Baseline comparison — ViT1D (1D Vision Transformer)
# =============================================================================
# Pure Transformer baseline using patch embeddings + positional encoding +
# CLS token.  Same data / loss / CV setup as the ablation configs so results
# are directly comparable to MBA_v1.
#
# Usage:
#   python3.11 training/train_scratch.py \
#     --config experiments/configs/ablation/baseline_vit1d.yaml

experiment:
  name: baseline_vit1d
  description: "ViT1D baseline — 1D Vision Transformer with multi-task heads."
  task: scratch_detection
  date: "2026-04-18"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/mbav1_scaler.joblib

model:
  architecture: vit1d
  overrides:
    # ViT1D hyperparameters (see setup_model "vit1d" case)
    patch_size: 60
    stride: 30                # was 10 — cut overlap, ~39 tokens instead of 117
    encoder_layers: 7         # was 4; deeper backbone
    decoder_layers: 0         # not used by supervised forward(); keep at 0
    num_heads: 8              # was 4; cleaner head_dim division with embed_dim=256
    embed_dim: 256            # was None → 180 (= 60x3, awkward for 4-head attn)
    use_embedding: true       # was false — add missing learned patch projection
    pos_learnable: false      # sinusoidal; generalises better across segment lengths
    average_mask: false
    supcon_loss: false

training:
  output: baseline-vit1d-bs32-loso
  execution_mode: train
  epochs: 200
  batch_size: 32
  num_gpu: 0
  clear_tracker: true
  data_augmentation: 0
  testing: LOSO

transfer_learning:
  freeze_encoder: false
  pretrained_model_path: ""

reproducibility:
  random_seed: 42
  torch_seed: 42
  numpy_seed: 42
