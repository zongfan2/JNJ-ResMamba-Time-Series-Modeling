# =============================================================================
# Ablation — "Single-Task (Cls Only)" : only optimize the classification loss
# =============================================================================
# Keeps wl1 (binary scratch classification) active and zeroes out wl2
# (per-timestep mask) and wl3 (severity regression). Multi-task heads still
# exist but their losses do not backpropagate.
#
# Usage:
#   python3.11 training/train_scratch.py \
#     --config experiments/configs/ablation/ablation_cls_only.yaml

experiment:
  name: ablation_cls_only
  description: "MBA_v1 trained with classification loss only (wl2 = wl3 = 0)."
  task: scratch_detection
  date: "2026-04-14"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/mbav1_scaler.joblib

model:
  architecture: mbav1
  overrides:
    wl2: 0.0
    wl3: 0.0

training:
  output: ablation-cls_only-bs32-fold4
  execution_mode: train
  epochs: 200
  batch_size: 32
  num_gpu: 0
  clear_tracker: true
  data_augmentation: 0
  testing: LOFO

transfer_learning:
  freeze_encoder: false
  pretrained_model_path: ""

reproducibility:
  random_seed: 42
  torch_seed: 42
  numpy_seed: 42
