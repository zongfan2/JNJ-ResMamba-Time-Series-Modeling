# =============================================================================
# Ablation — "Ours (w/ MAE pretrain)" : full MBA_v1 initialized from UKB MAE
# =============================================================================
# Same setup as ablation_full_no_pretrain.yaml except the encoder is
# initialized from the MAE encoder-only checkpoint produced by
# training/pretrain_ukb_mae.py.
#
# Usage:
#   python3.11 training/train_scratch.py \
#     --config experiments/configs/ablation/ablation_full_with_mae.yaml

experiment:
  name: ablation_full_with_mae
  description: "Full MBA_v1 fine-tuned from UKB MAE encoder, LOSO CV."
  task: scratch_detection
  date: "2026-04-15"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/mbav1_scaler.joblib

model:
  architecture: mbav1
  overrides: {}

training:
  output: ablation-full-mae_pretrain-bs32-loso
  execution_mode: train
  epochs: 200
  batch_size: 32
  num_gpu: 0
  clear_tracker: true
  data_augmentation: 0
  testing: LOSO

transfer_learning:
  freeze_encoder: false
  pretrained_model_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/pretrain_mae/weights/MAE_encoder_only.pth

reproducibility:
  random_seed: 42
  torch_seed: 42
  numpy_seed: 42
