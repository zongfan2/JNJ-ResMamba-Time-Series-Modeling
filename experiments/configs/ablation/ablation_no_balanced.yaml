# =============================================================================
# Ablation — "w/o Balanced Sampling" : natural class distribution
# =============================================================================
# Disables undersampling in the training batch generator by flipping
# `stratify` off. Class frequencies in each batch match the raw dataset.
#
# Usage:
#   python3.11 training/train_scratch.py \
#     --config experiments/configs/ablation/ablation_no_balanced.yaml

experiment:
  name: ablation_no_balanced
  description: "MBA_v1 trained without balanced (undersample) batch sampling."
  task: scratch_detection
  date: "2026-04-14"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: /mnt/code/munge/predictive_modeling/std_scaler_3s.bin

model:
  architecture: mbav1
  overrides:
    stratify: false  # data/batching.py falls through to natural distribution

training:
  output: ablation-no_balanced-bs32-fold4
  execution_mode: train
  epochs: 200
  batch_size: 32
  num_gpu: 0
  clear_tracker: true
  data_augmentation: 0
  testing: LOFO

transfer_learning:
  freeze_encoder: false
  pretrained_model_path: ""

reproducibility:
  random_seed: 42
  torch_seed: 42
  numpy_seed: 42
