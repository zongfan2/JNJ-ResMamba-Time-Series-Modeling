# =============================================================================
# Ablation — "w/o Cross-Attention" : keep ResNet, cut the U-shaped skips
# =============================================================================
# Keeps the ResNet encoder AND the Mamba decoder but disables the U-shaped
# cross-attention skip connections between them. Implemented via the new
# use_skip_cross_attention flag on MBA_v1 (models/resmamba.py).
#
# Usage:
#   python3.11 training/train_scratch.py \
#     --config experiments/configs/ablation/ablation_no_cross_attn.yaml

experiment:
  name: ablation_no_cross_attn
  description: "MBA_v1 with ResNet-Mamba cross-attention skips disabled."
  task: scratch_detection
  date: "2026-04-14"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/mbav1_scaler.joblib

model:
  architecture: mbav1
  overrides:
    use_skip_cross_attention: false  # pass None for encoder_states in decoder

training:
  output: ablation-no_cross_attn-bs32-fold4
  execution_mode: train
  epochs: 200
  batch_size: 32
  num_gpu: 0
  clear_tracker: true
  data_augmentation: 0
  testing: LOFO

transfer_learning:
  freeze_encoder: false
  pretrained_model_path: ""

reproducibility:
  random_seed: 42
  torch_seed: 42
  numpy_seed: 42
