# =============================================================================
# Ablation — "w/o Mamba Encoder" : ResNet mapping feeds heads directly
# =============================================================================
# Sets blocks_MBA1 = 0 so the cross-attention Mamba decoder is removed;
# the ResNet encoder feeds straight into the three prediction heads.
#
# Usage:
#   python3.11 training/train_scratch.py \
#     --config experiments/configs/ablation/ablation_no_mamba.yaml

experiment:
  name: ablation_no_mamba
  description: "MBA_v1 with the Mamba decoder removed (blocks_MBA1 = 0)."
  task: scratch_detection
  date: "2026-04-14"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: /mnt/code/munge/predictive_modeling/std_scaler_3s.bin

model:
  architecture: mbav1
  overrides:
    blocks_MBA1: 0  # drop all Mamba decoder layers

training:
  output: ablation-no_mamba-bs32-fold4
  execution_mode: train
  epochs: 200
  batch_size: 32
  num_gpu: 0
  clear_tracker: true
  data_augmentation: 0
  testing: LOFO

transfer_learning:
  freeze_encoder: false
  pretrained_model_path: ""

reproducibility:
  random_seed: 42
  torch_seed: 42
  numpy_seed: 42
