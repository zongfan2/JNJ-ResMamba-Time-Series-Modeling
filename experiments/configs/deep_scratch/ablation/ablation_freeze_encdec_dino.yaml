# =============================================================================
# Ablation — "Freeze Encoder + Decoder (DINO init)" : only heads train
# =============================================================================
# Linear-probe style: both encoder (input_projection, cls_token, encoder,
# positional_encoding) AND the cross-attention Mamba decoder are frozen;
# only out1/out2/out3 heads update. Mirrored by ablation_freeze_encdec_mae.
#
# Usage:
#   python3.11 training/train_scratch.py \
#     --config experiments/configs/ablation/ablation_freeze_encdec_dino.yaml

experiment:
  name: ablation_freeze_encdec_dino
  description: "DINO-init MBA_v1 with encoder + decoder frozen; only heads train."
  task: scratch_detection
  date: "2026-04-15"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/mbav1_scaler.joblib

model:
  architecture: mbav1
  overrides: {}

training:
  output: ablation-freeze_encdec_dino-bs32-fold4
  execution_mode: train
  epochs: 200
  batch_size: 32
  num_gpu: 0
  clear_tracker: true
  data_augmentation: 0
  testing: LOFO

transfer_learning:
  freeze_encoder: encoder_and_decoder  # encoder + decoder frozen
  pretrained_model_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/pretrain_dino/weights/DINO_encoder_only.pth

reproducibility:
  random_seed: 42
  torch_seed: 42
  numpy_seed: 42
