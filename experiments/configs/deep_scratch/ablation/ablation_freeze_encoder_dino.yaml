# =============================================================================
# Ablation — "Freeze Encoder (DINO init)" : DINO-init MBA_v1, encoder frozen
# =============================================================================
# Pairs with ablation_full_with_dino.yaml (no freeze) and
# ablation_freeze_encdec_dino.yaml (freeze encoder + decoder) to form a
# 3-row DINO fine-tuning-strategy sub-ablation. Mirrored by the
# *_mae.yaml triplet for the MAE initialization.
#
# Usage:
#   python3.11 training/train_scratch.py \
#     --config experiments/configs/ablation/ablation_freeze_encoder_dino.yaml

experiment:
  name: ablation_freeze_encoder_dino
  description: "DINO-init MBA_v1 with encoder frozen; decoder + heads trainable."
  task: scratch_detection
  date: "2026-04-15"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/mbav1_scaler.joblib

model:
  architecture: mbav1
  overrides: {}

training:
  output: ablation-freeze_encoder_dino-bs32-fold4
  execution_mode: train
  epochs: 200
  batch_size: 32
  num_gpu: 0
  clear_tracker: true
  data_augmentation: 0
  testing: LOFO

transfer_learning:
  freeze_encoder: encoder  # freeze input_projection, cls_token, encoder, PE
  pretrained_model_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/pretrain_dino/weights/DINO_encoder_only.pth

reproducibility:
  random_seed: 42
  torch_seed: 42
  numpy_seed: 42
