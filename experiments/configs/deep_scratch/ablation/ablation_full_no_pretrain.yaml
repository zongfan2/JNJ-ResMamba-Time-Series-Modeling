# =============================================================================
# Ablation — "Ours (w/o pretrain)" : full MBA_v1 trained from scratch
# =============================================================================
# Baseline for the ablation table in papers/deep_scratch/deepscratch.tex
# (Sec. 6 Ablation Study). All other ablation configs deviate from this one
# via `model.overrides`.
#
# Usage:
#   python3.11 training/train_scratch.py \
#     --config experiments/configs/ablation/ablation_full_no_pretrain.yaml

experiment:
  name: ablation_full_no_pretrain
  description: "Full MBA_v1, no UKB pretrain, LOSO CV (baseline for ablation)."
  task: scratch_detection
  date: "2026-04-14"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/mbav1_scaler.joblib

model:
  architecture: mbav1
  # No overrides — use param_mba_v1 defaults.
  overrides: {}

training:
  output: ablation-full-no_pretrain-bs32-loso
  execution_mode: train
  epochs: 200
  batch_size: 32
  num_gpu: 0
  clear_tracker: true
  data_augmentation: 0
  testing: LOSO

transfer_learning:
  freeze_encoder: false
  pretrained_model_path: ""

reproducibility:
  random_seed: 42
  torch_seed: 42
  numpy_seed: 42
