# =============================================================================
# Deployment retrain — Xing et al. 2024 (MDPI Sensors), feature-engineering arm
# =============================================================================
# All-NOPROD retrain (no held-out fold) for the production NS_production
# pipeline.  Mirrors the LOSO config; the only meaningful difference is
# ``training.train_all: true``, which skips CV and trains a single model
# on the full dataset.
#
# Performance: there is NO held-out estimate for the deployed artifact.
# Report the matching LOSO numbers from Table 8 in the paper
# (F1=56.79, P=43.03, R=83.47, AUROC=76.49, R²=−0.794, MAE=2.081) as the
# expected production performance.
#
# IMPORTANT: this retrain extracts tsfresh ComprehensiveFCParameters on the
# FULL training pool (~3× the segments of one LOSO fold), which can take
# 30+ minutes and a lot of memory.  Tune ``tsfresh_chunk_size`` down on
# memory-tight hosts.
#
# Usage:
#   python3.11 training/train_classical.py \
#     --config experiments/configs/deployment/deploy_mdpi2024_fe_all.yaml
#
# Output:
#   /mnt/data/GENEActive-featurized/results/DL/<dataset>/deploy-mdpi2024_fe-all-NOPROD/
#     training/model_weights/mdpi2024_fe_weights.joblib
# Drop that file into NS_production/model/ to deploy.

experiment:
  name: deploy_mdpi2024_fe_all
  description: "Deployment retrain — tsfresh + sklearn GradientBoosting on ALL NOPROD."
  task: scratch_detection
  date: "2026-05-14"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: ""

model:
  architecture: mdpi2024_fe
  overrides:
    feature_set: tsfresh
    standardize_features: true
    # GradientBoostingClassifier hyperparameters — paper values.
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 3
    subsample: 1.0
    random_state: 42
    # tsfresh knobs.  Comprehensive set is the slowest but matches the paper.
    tsfresh_n_jobs: -1
    tsfresh_feature_set: comprehensive
    tsfresh_progress: true
    tsfresh_chunk_size: 50000
    reg_hurdle: true
    reg_log_target: true

training:
  output: deploy-mdpi2024_fe-all-NOPROD
  execution_mode: train
  train_all: true            # ← key knob: skip CV, retrain on full NOPROD
  num_gpu: 0

# Paper-faithful 3-s sliding-window protocol (identical to LOSO config).
windowing:
  enabled: true
  fs_hz: 20
  win_seconds: 3.0
  train_stride_seconds: 1.5
  infer_stride_seconds: 3.0
  label_min_scratch_seconds: 1.0
  duration_estimator: count
  min_pos_windows: 2

reproducibility:
  random_seed: 42
  numpy_seed: 42
