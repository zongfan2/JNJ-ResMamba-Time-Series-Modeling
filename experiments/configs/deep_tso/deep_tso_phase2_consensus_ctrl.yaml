# Phase-2 CONTROL: identical to deep_tso_phase2_consensus.yaml but with annotator-
# consensus weighting OFF. Same consensus H5 (so same data/split) and same GCE+SupCon
# recipe, so the only change vs Phase 2 is use_consensus_weight -> the matched pair
# isolates the consensus-weighting effect.
experiment:
  name: deep_tso_phase2_consensus_ctrl
data:
  input_h5: /mnt/data/GENEActive-featurized/h5/deep_tso_20hz_sincos_consensus.h5
  split_file: /mnt/data/GENEActive-featurized/h5/deep_tso_20hz_sincos_consensus_split.npz
model:
  architecture: mba4tso_patch
  projection_dim: 128
training:
  output: deep_tso_phase2_consensus_ctrl
  output_root: /mnt/data/GENEActive-featurized/results/DL/DeepTSO-JNJ
  testing: LOFO
  num_folds: 4
  batch_size: 8
  epochs: 60
  lr: 0.001
loss:
  base_loss: gce
  gce_q: 0.7
  use_consensus_weight: false   # <-- the single change vs deep_tso_phase2_consensus
  components:
    w_trans: 0.0
    w_dur: 0.0
    w_elr: 0.0
    w_supcon: 0.1
  supcon_temperature: 0.07
evaluation:
  enforce_single_tso: true
