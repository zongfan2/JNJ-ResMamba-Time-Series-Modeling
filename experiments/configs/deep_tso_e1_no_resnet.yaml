# E1 architecture ablation — REMOVE the residual convolutional feature extractor.
# One-line delta from deep_tso_e1_full.yaml: num_feature_layers 6 -> 0. This also
# disables the U-Net skips (they consume the feature extractor's intermediate maps),
# so it isolates "patch embedding + Mamba encoder" with no convolutional front end.
experiment:
  name: deep_tso_e1_no_resnet
data:
  input_h5: /mnt/data/GENEActive-featurized/h5/deep_tso_20hz_sincos.h5
  split_file: /mnt/data/GENEActive-featurized/h5/deep_tso_20hz_sincos_split.npz
model:
  architecture: mba4tso_patch
  projection_dim: 128
  blocks_mba: 5
  num_feature_layers: 0     # <-- ablation: no ResNet feature extractor (skips auto-off)
  featurelayer: ResNet
  skip_connect: true
  skip_cross_attention: false
training:
  output: deep_tso_e1_no_resnet
  output_root: /mnt/data/GENEActive-featurized/results/DL/DeepTSO-JNJ
  testing: LOFO
  num_folds: 4
  batch_size: 8
  epochs: 60
  lr: 0.001
loss:
  base_loss: ce
  components:
    w_trans: 0.0
    w_dur: 0.0
    w_elr: 0.0
    w_supcon: 0.0
evaluation:
  enforce_single_tso: true
