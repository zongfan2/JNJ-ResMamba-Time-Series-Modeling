experiment:
  name: deep_tso_phase1_baseline_gn
data:
  input_h5: /mnt/data/GENEActive-featurized/h5/deep_tso_20hz_sincos.h5
  split_file: /mnt/data/GENEActive-featurized/h5/deep_tso_20hz_sincos_split.npz
model:
  architecture: mba4tso_patch
  projection_dim: 128
  # GroupNorm in PatchEmbedding + ResNet FeatureExtractor (instead of BatchNorm).
  # GN normalizes per-sample at both train and eval (no running statistics), so it
  # removes the BatchNorm train/eval mismatch that — under subject-independent LOFO
  # (held-out subjects differ from train) — periodically flips validation to the
  # all-negative state and produces the train-smooth / val-sawtooth instability.
  # This is the diagnostic A/B against deep_tso_phase1_baseline (norm1=BN).
  norm1: GN
training:
  output: deep_tso_phase1_baseline_gn
  output_root: /mnt/data/GENEActive-featurized/results/DL/DeepTSO-JNJ
  testing: LOFO
  num_folds: 4
  batch_size: 8
  epochs: 60
  lr: 0.001
loss:
  base_loss: ce
  components:
    w_trans: 0.0
    w_dur: 0.0
    w_elr: 0.0
    w_supcon: 0.0
evaluation:
  enforce_single_tso: true
