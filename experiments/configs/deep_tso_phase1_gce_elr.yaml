experiment:
  name: deep_tso_phase1_gce_elr
data:
  # CROSS-DATASET: train/val carved from UKB (predictTSO only); test = ALL of noprod.
  input_h5: /mnt/data/GENEActive-featurized/h5/ukb_20hz_sincos.h5
  test_h5: /mnt/data/GENEActive-featurized/h5/deep_tso_20hz_sincos.h5
model:
  architecture: mba4tso_patch
  projection_dim: 128
training:
  output: deep_tso_phase1_gce_elr
  output_root: /mnt/data/GENEActive-featurized/results/DL/DeepTSO-JNJ
  batch_size: 48   # cross-dataset 4-GPU DataParallel (~12/GPU)
  epochs: 60
  lr: 0.001
  # Early-Learning Regularization: anchor predictions to the early-training EMA
  # consensus (less corrupted by noisy labels), which directly targets the late
  # memorization collapse seen in the GCE / GCE+SupCon arms (val_f1 -> 0).
  elr_beta: 0.7              # EMA momentum for the per-segment target
  elr_warmup_epochs: 5       # ELR loss is 0 until this epoch; memory still accumulates
loss:
  base_loss: gce
  gce_q: 0.7
  # ELR added on top of GCE (transition/duration priors stay OFF) so this arm
  # isolates ELR's effect against the plain GCE arm.
  components:
    w_trans: 0.0
    w_dur: 0.0
    w_elr: 0.5
    w_supcon: 0.0
evaluation:
  enforce_single_tso: true
