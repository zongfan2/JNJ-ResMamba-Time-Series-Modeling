experiment:
  name: deep_tso_ukb2noprod
data:
  # TRAIN+VAL: UKB (predictTSO only; no inTSO needed). BUILD THIS FIRST (see header
  # of experiments/domino/build_deep_tso_h5.sh) with GT_COLUMN="" since UKB has no inTSO.
  input_h5: /mnt/data/GENEActive-featurized/h5/ukb_20hz_sincos.h5
  # TEST: noprod, which carries inTSO as Y_gt for the honest evaluation.
  test_h5: /mnt/data/GENEActive-featurized/h5/deep_tso_20hz_sincos.h5
model:
  architecture: mba4tso_patch
  projection_dim: 128
training:
  output: deep_tso_ukb2noprod
  output_root: /mnt/data/GENEActive-featurized/results/DL/DeepTSO-JNJ
  # --test_h5 set -> cross-dataset: train/val carved from UKB, test = ALL of noprod.
  batch_size: 48          # 4-GPU A40 (DataParallel ~12/GPU); bigger cross-night contrastive set
  epochs: 30              # UKB is large; AUC early-stopping (patience 10) caps it
  lr: 0.001
loss:
  base_loss: ce
  # Cross-night arm chosen at run time via --w_supcon / --w_consistency:
  #   baseline    : both 0
  #   SupCon      : --w_supcon 0.1
  #   consistency : --w_consistency 0.1   (manager's positive-only proposal)
  #   both        : --w_supcon 0.1 --w_consistency 0.1
  components:
    w_trans: 0.0
    w_dur: 0.0
    w_elr: 0.0
    w_supcon: 0.0
    w_consistency: 0.0
evaluation:
  enforce_single_tso: true
