# =============================================================================
# Deployment retrain — Ji et al. 2023 (npj Digital Medicine), LightGBM (pragmatic)
# =============================================================================
# All-NOPROD retrain (no held-out fold) for the production NS_production
# pipeline.  Mirrors the LOSO config; the only meaningful difference is
# ``training.train_all: true``, which skips CV and trains a single model
# on the full dataset.
#
# Performance: there is NO held-out estimate for the deployed artifact.
# Report the matching LOSO numbers from Table 8 in the paper
# (F1=57.79, P=44.27, R=83.20, AUROC=76.22, R²=−0.676, MAE=2.131) as the
# expected production performance.
#
# Usage:
#   python3.11 training/train_classical.py \
#     --config experiments/configs/deployment/deploy_ji2023_all.yaml
#
# Output:
#   /mnt/data/GENEActive-featurized/results/DL/<dataset>/deploy-ji2023-all-NOPROD/
#     training/model_weights/ji2023_weights.joblib
# Drop that file into NS_production/model/ to deploy.

experiment:
  name: deploy_ji2023_all
  description: "Deployment retrain — LightGBM on 36 hand-crafted features (DL features off) on ALL NOPROD."
  task: scratch_detection
  date: "2026-05-14"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: ""

model:
  architecture: ji2023
  overrides:
    # LightGBM classifier — paper-faithful, identical to the LOSO config.
    n_estimators: 500
    learning_rate: 0.05
    num_leaves: 31
    max_depth: -1
    min_child_samples: 20
    reg_lambda: 0.0
    scale_pos_weight: null     # auto (neg/pos) — set from the full-data ratio
    random_state: 42

    # DL features deliberately disabled for the deployment artifact:
    # the train-time OOF stacking requires subject-grouped k-fold inside the
    # full training pool, which works fine, but adds substantial training
    # time and TWO extra torch models inside the joblib.  Flip to ``true``
    # if you want the paper-pragmatic variant deployed.
    use_dl_features: false
    dl_max_len: 1200
    dl_epochs: 30
    dl_batch_size: 128
    dl_learning_rate: 0.001
    dl_oof_folds: 3
    dl_verbose: false

    reg_hurdle: true
    reg_log_target: true

training:
  output: deploy-ji2023-all-NOPROD
  execution_mode: train
  train_all: true            # ← key knob: skip CV, retrain on full NOPROD
  num_gpu: 0

# Paper-faithful 3-s sliding-window protocol (identical to LOSO config).
windowing:
  enabled: true
  fs_hz: 20
  win_seconds: 3.0
  train_stride_seconds: 1.5
  infer_stride_seconds: 3.0
  label_min_scratch_seconds: 1.0
  duration_estimator: count
  min_pos_windows: 2

reproducibility:
  random_seed: 42
  numpy_seed: 42
