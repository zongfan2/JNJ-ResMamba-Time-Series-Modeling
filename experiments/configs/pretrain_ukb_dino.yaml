# =============================================================================
# UKB DINO Pretraining Config for Deep Scratch
# =============================================================================
# Pre-trains MBA_v1 encoder on UK Biobank accelerometer data using DINO.
# The resulting encoder weights can then be loaded into MBA_v1 for finetuning
# on JNJ scratch detection data.
#
# Usage:
#   python3.11 training/pretrain_ukb.py --config experiments/configs/pretrain_ukb_dino.yaml

# --- Data ---
data:
  ukb_h5_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/ukb_pretrain_20hz.h5
  max_segments: 0  # 0 = all 1.3M segments (~48 GB DataFrame, fits in 156 GB RAM)
  max_seq_len: 1221  # 61s @ 20Hz, matching production
  # Pre-fitted MBA_v1 scaler (3 features: x, y, z) — pretraining transforms
  # UKB data with this scaler so the encoder learns in the same distribution
  # JNJ finetuning will use. Set to empty string to fall back to fitting
  # a fresh scaler on UKB.
  # mean:  [-8.76e-06,  2.25e-06,  1.77e-06]
  # scale: [ 0.2026,    0.1444,    0.1708  ]
  scaler_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/mbav1_scaler.joblib

# --- Model ---
model:
  model: mbav1_pretrain
  pretraining_method: DINO

# --- Training ---
training:
  batch_size: 512  # total batch; DataParallel splits across GPUs (512/4 = 128 per GPU)
  epochs: 30  # 1.3M segments × 30 epochs = 39M views — plenty for DINO
  lr: 0.0004  # scale with sqrt(512/32) ≈ 4x from 0.0001
  optim: AdamW
  weight_decay: 0.04
  warmup_epochs: 5
  patience: 15
  gradient_clip: 1.0
  use_amp: "True"

# --- DINO-specific ---
dino:
  momentum_start: 0.996
  momentum_end: 1.0
  projection_dim: 256
  projection_hidden: 512

# --- Checkpoint ---
checkpoint:
  save_every: 5
  keep_last_n: 5

# --- GPU ---
gpu:
  num_gpu: "4"

# --- Output ---
output:
  output_dir: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/pretrain_dino/
  clear_tracker: "False"
