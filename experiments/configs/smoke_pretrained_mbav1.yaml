# =============================================================================
# Smoke test — MBA_v1 fine-tuning from UKB DINO pretrained weights
# =============================================================================
# Purpose: end-to-end sanity check before launching the full ablation sweep.
# Runs a single fold (FOLD4) for a few epochs to verify:
#   * the DINO encoder-only checkpoint loads into MBA_v1 (key matching works)
#   * no shape/type mismatches between UKB-pretrained and JNJ fine-tune paths
#   * loss decreases and no NaN
#
# Usage:
#   python3.11 training/train_scratch.py \
#     --config experiments/configs/smoke_pretrained_mbav1.yaml

experiment:
  name: smoke_pretrained_mbav1
  description: "Smoke test: MBA_v1 + DINO encoder, single fold, few epochs."
  task: scratch_detection
  date: "2026-04-14"

data:
  input_folder: /mnt/data/Nocturnal-scratch/geneactive_20hz_3s_b1s_production_train_van_new_enh_lth-rth/raw/
  format: folder
  scaler_path: /mnt/code/munge/predictive_modeling/std_scaler_3s.bin

model:
  architecture: mbav1
  overrides: {}

training:
  output: smoke-mbav1-dino-fold4
  execution_mode: train
  epochs: 5             # just enough to see loss move
  batch_size: 32
  num_gpu: 0
  clear_tracker: true
  data_augmentation: 0
  testing: LOFO
  single_fold: FOLD4    # restrict LOFO loop to this single fold

transfer_learning:
  freeze_encoder: false
  # Swap to the MAE encoder to sanity-check the MAE path too:
  #   /mnt/data/GENEActive-featurized/results/DL/UKB_v2/pretrain_mae/weights/MAE_encoder_only.pth
  pretrained_model_path: /mnt/data/GENEActive-featurized/results/DL/UKB_v2/pretrain_dino/weights/DINO_encoder_only.pth

reproducibility:
  random_seed: 42
  torch_seed: 42
  numpy_seed: 42
